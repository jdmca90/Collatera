<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collatera · reference library</title>
<meta name="description" content="A personal reference image library.">

<!-- ============================================================= -->
<!--  Web-font fallback. On your own Mac/PC this will render in     -->
<!--  Gill Sans MT / Calibri (your brand fonts) automatically.     -->
<!--  Hanken Grotesk loads as the cross-device fallback so the      -->
<!--  site looks consistent on phones and other people's machines.  -->
<!-- ============================================================= -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    /* ---- Light palette (your "Light profile") ---- */
    --bg:        #FAF7F0;   /* page background  */
    --surface:   #F0EDE6;   /* cards, header    */
    --ink:       #2E2C2A;   /* body text        */
    --muted:     #6B6860;   /* secondary text   */
    --border:    #D8D4CC;   /* hairlines        */
    --accent:        #85CCCC;  /* teal base   */
    --accent-deep:   #3F8F8F;  /* teal deep (text on tint) */
    --accent-tint:   #E7F4F4;  /* teal tint   */
    --shadow:    rgba(46,44,42,0.10);
    --radius:    16px;

    /* Category accent colours, rotating through your palette */
    --c1: #85CCCC; --c2: #90C0D8; --c3: #8DD4A8;
    --c4: #A5C878; --c5: #C0AEDD; --c6: #F0A860;
  }

  @media (prefers-color-scheme: dark) {
    :root[data-theme="auto"] {
      --bg:#26241F; --surface:#302D27; --ink:#F2EFE7; --muted:#A8A399;
      --border:#3F3B33; --accent:#85CCCC; --accent-deep:#A9DEDE;
      --accent-tint:#2C3A3A; --shadow:rgba(0,0,0,0.35);
    }
  }
  :root[data-theme="dark"] {
    --bg:#26241F; --surface:#302D27; --ink:#F2EFE7; --muted:#A8A399;
    --border:#3F3B33; --accent:#85CCCC; --accent-deep:#A9DEDE;
    --accent-tint:#2C3A3A; --shadow:rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Calibri Light", "Calibri", "Hanken Grotesk", system-ui, sans-serif;
    background-color: var(--bg);
    /* soft paper texture */
    background-image:
      radial-gradient(var(--border) 0.5px, transparent 0.5px),
      radial-gradient(var(--border) 0.5px, var(--bg) 0.5px);
    background-size: 28px 28px;
    background-position: 0 0, 14px 14px;
    background-attachment: fixed;
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  h1, h2, h3, .brand, .chip, .count {
    font-family: "Gill Sans MT", "Gill Sans", "Gill Sans Nova",
                 "Hanken Grotesk", "Segoe UI", sans-serif;
  }

  /* ---------- Header ---------- */
  header {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in srgb, var(--surface) 88%, transparent);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1180px; margin: 0 auto;
    padding: 14px 20px 0;
  }
  .header-top {
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  }
  .brand {
    font-size: 30px; font-weight: 700; letter-spacing: -0.5px;
    color: var(--accent-deep); text-decoration: none; line-height: 1;
  }
  .brand .dot { color: var(--ink); }
  .tagline { font-size: 14px; color: var(--muted); }
  .spacer { flex: 1 1 auto; }
  .theme-btn {
    border: 1px solid var(--border); background: var(--bg);
    color: var(--muted); border-radius: 999px;
    width: 38px; height: 38px; cursor: pointer; font-size: 17px;
    display: grid; place-items: center; transition: .2s;
  }
  .theme-btn:hover { color: var(--accent-deep); border-color: var(--accent); }

  .search-wrap { position: relative; margin: 14px 0; }
  .search-wrap svg {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none;
  }
  #search {
    width: 100%; padding: 13px 16px 13px 46px;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--bg); color: var(--ink);
    font: inherit; font-size: 16px; outline: none; transition: .2s;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-tint); }

  /* ---------- Category chips ---------- */
  .chips {
    display: flex; gap: 8px; overflow-x: auto; padding: 0 0 14px;
    scrollbar-width: none;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto; cursor: pointer; user-select: none;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--muted); padding: 7px 15px; border-radius: 999px;
    font-size: 14px; font-weight: 600; white-space: nowrap; transition: .18s;
  }
  .chip:hover { color: var(--ink); border-color: var(--accent); }
  .chip[aria-pressed="true"] {
    background: var(--accent-tint); color: var(--accent-deep);
    border-color: var(--accent);
  }

  /* ---------- Gallery ---------- */
  main { max-width: 1180px; margin: 0 auto; padding: 24px 20px 80px; }
  .count { font-size: 14px; color: var(--muted); margin-bottom: 18px; }

  .grid {
    display: grid; gap: 20px;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; cursor: pointer;
    display: flex; flex-direction: column; text-align: left;
    font: inherit; color: inherit; padding: 0;
    box-shadow: 0 1px 2px var(--shadow); transition: transform .2s, box-shadow .2s;
    opacity: 0; transform: translateY(12px);
    animation: rise .5s ease forwards;
  }
  @keyframes rise { to { opacity: 1; transform: none; } }
  .card:hover { transform: translateY(-4px); box-shadow: 0 10px 26px var(--shadow); }
  .card:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
  .thumb {
    aspect-ratio: 4 / 3; width: 100%; object-fit: cover;
    background: var(--bg); border-bottom: 1px solid var(--border); display: block;
  }
  .card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 6px; }
  .card-title { font-size: 16px; font-weight: 600; line-height: 1.25; }
  .card-note { font-size: 13.5px; color: var(--muted); }
  .tag {
    align-self: flex-start; margin-top: 2px;
    font-size: 11.5px; font-weight: 600; letter-spacing: .03em;
    text-transform: uppercase; padding: 3px 9px; border-radius: 999px;
    color: var(--ink);
  }

  .empty { text-align: center; color: var(--muted); padding: 70px 20px; }
  .empty strong { color: var(--ink); display: block; font-size: 18px; margin-bottom: 6px;
    font-family: "Gill Sans MT","Hanken Grotesk",sans-serif; }

  /* ---------- Lightbox ---------- */
  .lightbox {
    position: fixed; inset: 0; z-index: 100; display: none;
    background: rgba(20,18,16,0.72); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 24px;
  }
  .lightbox.open { display: flex; }
  .lb-panel {
    background: var(--bg); border-radius: 18px; max-width: 1000px; width: 100%;
    max-height: 92vh; overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5); animation: pop .25s ease;
  }
  @keyframes pop { from { opacity:0; transform: scale(.97);} to {opacity:1; transform:none;} }
  .lb-imgwrap {
    background: var(--surface); display: grid; place-items: center;
    overflow: auto; padding: 16px; flex: 1 1 auto; min-height: 0;
  }
  .lb-imgwrap img { max-width: 100%; max-height: 70vh; border-radius: 8px; }
  .lb-meta {
    padding: 16px 22px 20px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
  }
  .lb-title { font-size: 20px; font-weight: 700;
    font-family:"Gill Sans MT","Hanken Grotesk",sans-serif; }
  .lb-note { font-size: 15px; color: var(--muted); }
  .lb-close, .lb-nav {
    position: absolute; top: 18px; right: 18px;
    width: 44px; height: 44px; border-radius: 999px; border: none;
    background: rgba(0,0,0,0.45); color: #fff; font-size: 22px;
    cursor: pointer; display: grid; place-items: center; transition: .2s;
  }
  .lb-close:hover { background: rgba(0,0,0,0.7); }
  .lb-nav { top: 50%; transform: translateY(-50%); }
  .lb-prev { left: 18px; right: auto; }
  .lb-next { right: 18px; }
  .lb-nav:hover { background: rgba(0,0,0,0.7); }

  footer {
    max-width: 1180px; margin: 0 auto; padding: 0 20px 50px;
    color: var(--muted); font-size: 13px; text-align: center;
  }
  footer a { color: var(--accent-deep); }

  @media (max-width: 560px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
    .brand { font-size: 26px; }
    .lb-meta { padding: 14px 18px 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <a href="index.html" class="brand">Collatera</a>
      <span class="tagline">reference library</span>
      <span class="spacer"></span>
      <button class="theme-btn" id="themeBtn" title="Switch light / dark" aria-label="Switch light or dark mode">◐</button>
    </div>

    <div class="search-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="search" placeholder="Search titles, notes, tags…" autocomplete="off" aria-label="Search the library">
    </div>

    <div class="chips" id="chips" role="tablist" aria-label="Filter by category"></div>
  </div>
</header>

<main>
  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <strong>Nothing found</strong>
    Try a different word, or pick a different category above.
  </div>
</main>

<footer>
  collatera.org &middot; a personal reference library.
</footer>

<!-- ---------- Lightbox markup ---------- -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-labelledby="lbTitle">
  <button class="lb-close" id="lbClose" aria-label="Close">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous">‹</button>
  <button class="lb-nav lb-next" id="lbNext" aria-label="Next">›</button>
  <div class="lb-panel">
    <div class="lb-imgwrap"><img id="lbImg" src="" alt=""></div>
    <div class="lb-meta">
      <div class="lb-title" id="lbTitle"></div>
      <div class="lb-note" id="lbNote"></div>
    </div>
  </div>
</div>

<script>
/* =================================================================
   ====   YOUR LIBRARY LIVES HERE  —  THIS IS THE ONLY PART     ====
   ====   YOU NEED TO EDIT TO ADD OR CHANGE IMAGES.             ====
   =================================================================

   HOW TO ADD AN IMAGE  (two steps):
     1. Put your picture file inside the  images/  folder.
     2. Add ONE block below, copying the pattern. Example:

          {
            file:  "images/my-picture.png",   // the file you just added
            title: "What it's called",         // shown under the picture
            cat:   "Echo",                     // must match a category name below
            note:  "A short description.",     // optional — leave "" for none
            tags:  "extra search words here"   // optional — helps search find it
          },

     Order in this list = order on the page. Newest at the top is a nice habit.

   HOW TO ADD A CATEGORY:
     Add its name to the CATEGORIES list below. Then use that exact name
     in the "cat:" field of any image. Capitalisation must match.

   Image file types that work: .png  .jpg  .jpeg  .webp  .gif  .svg
   ================================================================= */

const CATEGORIES = ["Cath / Angio", "Echo", "ECG", "Hemodynamics", "Valves"];

const IMAGES = [
  {
    file: "images/sample-coronary-dominance.svg",
    title: "Coronary Dominance",
    cat:  "Cath / Angio",
    note: "Right- vs. left-dominant circulation at a glance.",
    tags: "PDA posterior descending RCA circumflex"
  },
  {
    file: "images/sample-tof-views.svg",
    title: "Angiographic Views",
    cat:  "Cath / Angio",
    note: "LAO / RAO with cranial and caudal angulation.",
    tags: "projections spider view oblique"
  },
  {
    file: "images/sample-tee-windows.svg",
    title: "TEE Standard Views",
    cat:  "Echo",
    note: "Mid-esophageal and transgastric windows.",
    tags: "transesophageal probe omniplane"
  },
  {
    file: "images/sample-swan-pressures.svg",
    title: "Swan-Ganz Waveforms",
    cat:  "Hemodynamics",
    note: "RA, RV, PA and wedge pressure tracings.",
    tags: "pulmonary artery catheter PCWP right heart"
  },
  {
    file: "images/sample-ekg-axis.svg",
    title: "ECG Axis Quadrants",
    cat:  "ECG",
    note: "Normal, left, right, and extreme axis deviation.",
    tags: "electrical axis lead I aVF deviation"
  },
  {
    file: "images/sample-valve-gradients.svg",
    title: "Aortic Stenosis Grading",
    cat:  "Valves",
    note: "Peak velocity, mean gradient and valve-area cutoffs.",
    tags: "AS severe AVA dimensionless index"
  }
];

/* =================================================================
   ====   You normally do NOT need to edit anything below here. ====
   ================================================================= */

const catColors = ["var(--c1)","var(--c2)","var(--c3)","var(--c4)","var(--c5)","var(--c6)"];
const colorFor = (cat) => {
  const i = CATEGORIES.indexOf(cat);
  return i >= 0 ? catColors[i % catColors.length] : "var(--border)";
};

const grid    = document.getElementById("grid");
const chipsEl = document.getElementById("chips");
const countEl = document.getElementById("count");
const emptyEl = document.getElementById("empty");
const searchEl= document.getElementById("search");

let activeCat = "All";
let query = "";
let visible = [];   // currently shown images, for lightbox navigation

/* ----- build category chips ----- */
function buildChips() {
  ["All", ...CATEGORIES].forEach(cat => {
    const b = document.createElement("button");
    b.className = "chip";
    b.textContent = cat;
    b.setAttribute("role", "tab");
    b.setAttribute("aria-pressed", cat === "All" ? "true" : "false");
    b.onclick = () => {
      activeCat = cat;
      [...chipsEl.children].forEach(c =>
        c.setAttribute("aria-pressed", c.textContent === cat ? "true" : "false"));
      render();
    };
    chipsEl.appendChild(b);
  });
}

/* ----- render the gallery ----- */
function render() {
  const q = query.trim().toLowerCase();
  visible = IMAGES.filter(img => {
    const catOk = activeCat === "All" || img.cat === activeCat;
    const hay = (img.title + " " + img.cat + " " + (img.note||"") + " " + (img.tags||"")).toLowerCase();
    const qOk = !q || hay.includes(q);
    return catOk && qOk;
  });

  grid.innerHTML = "";
  visible.forEach((img, i) => {
    const card = document.createElement("button");
    card.className = "card";
    card.style.animationDelay = (Math.min(i, 12) * 0.04) + "s";
    card.onclick = () => openLightbox(i);
    card.innerHTML = `
      <img class="thumb" src="${img.file}" alt="${img.title}" loading="lazy"
           onerror="this.style.opacity=.4;this.alt='Image not found — check the file name';">
      <div class="card-body">
        <span class="tag" style="background:${colorFor(img.cat)}">${img.cat}</span>
        <span class="card-title">${img.title}</span>
        ${img.note ? `<span class="card-note">${img.note}</span>` : ""}
      </div>`;
    grid.appendChild(card);
  });

  const n = visible.length;
  countEl.textContent = `${n} ${n === 1 ? "image" : "images"}` +
    (activeCat !== "All" ? ` in ${activeCat}` : "") +
    (q ? ` matching “${query.trim()}”` : "");
  emptyEl.style.display = n ? "none" : "block";
  grid.style.display = n ? "grid" : "none";
}

/* ----- lightbox ----- */
const lb = document.getElementById("lightbox");
const lbImg = document.getElementById("lbImg");
const lbTitle = document.getElementById("lbTitle");
const lbNote = document.getElementById("lbNote");
let lbIndex = 0;

function openLightbox(i) {
  lbIndex = i;
  showLb();
  lb.classList.add("open");
  document.body.style.overflow = "hidden";
  document.getElementById("lbClose").focus();
}
function showLb() {
  const img = visible[lbIndex];
  if (!img) return;
  lbImg.src = img.file;
  lbImg.alt = img.title;
  lbTitle.textContent = img.title;
  lbNote.textContent = img.note || "";
}
function closeLb() {
  lb.classList.remove("open");
  document.body.style.overflow = "";
}
function step(d) {
  lbIndex = (lbIndex + d + visible.length) % visible.length;
  showLb();
}
document.getElementById("lbClose").onclick = closeLb;
document.getElementById("lbPrev").onclick = () => step(-1);
document.getElementById("lbNext").onclick = () => step(1);
lb.onclick = (e) => { if (e.target === lb) closeLb(); };
document.addEventListener("keydown", (e) => {
  if (!lb.classList.contains("open")) return;
  if (e.key === "Escape") closeLb();
  if (e.key === "ArrowLeft") step(-1);
  if (e.key === "ArrowRight") step(1);
});

/* ----- search ----- */
searchEl.addEventListener("input", (e) => { query = e.target.value; render(); });

/* ----- theme toggle (light <-> dark, remembers choice for the session) ----- */
const root = document.documentElement;
root.setAttribute("data-theme", "auto");
document.getElementById("themeBtn").onclick = () => {
  const cur = root.getAttribute("data-theme");
  root.setAttribute("data-theme", cur === "dark" ? "light" : "dark");
};

/* ----- go ----- */
buildChips();
render();
</script>
</body>
</html>
