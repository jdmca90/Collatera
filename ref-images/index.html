<!-- Search + filter chips (the shared header/banner are injected by site.js above) -->

<main>

  <div class="grid" id="grid"></div>

<footer>
  collatera.org &middot; a personal reference library.
</footer>

const catColors = ["var(--c1)","var(--c2)","var(--c3)","var(--c4)","var(--c5)","var(--c6)"];
const colorFor = (cat) => {
  const i = CATEGORIES.indexOf(cat);
  return i >= 0 ? catColors[i % catColors.length] : "var(--border)";
};

/* unique tags across the whole library, alphabetical */
const ALL_TAGS = [...new Set(IMAGES.flatMap(img => img.tags || []))].sort((a,b)=>a.localeCompare(b));

const grid    = document.getElementById("grid");
const chipsEl = document.getElementById("chips");
const countEl = document.getElementById("count");
const emptyEl = document.getElementById("empty");
const searchEl= document.getElementById("search");

let activeFilter = { type: "all", value: null };  // single-select
let query = "";
let visible = [];

/* ----- build the unified chip row: All · categories · | · tags ----- */
function chipButton(label, type, value, isTag) {
  const b = document.createElement("button");
  b.className = "chip" + (isTag ? " is-tag" : "");
  b.textContent = label;
  b.setAttribute("role","tab");
  const pressed = activeFilter.type === type && activeFilter.value === value;
  b.setAttribute("aria-pressed", pressed ? "true" : "false");
  b.onclick = () => {
    activeFilter = { type, value };
    [...chipsEl.querySelectorAll(".chip")].forEach(c => c.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true");
    render();
  };
  return b;
}
function buildChips() {
  chipsEl.appendChild(chipButton("All", "all", null, false));
  // view-mode chips (per-device history)
  const recent = chipButton("Recent", "recent", null, false); recent.classList.add("is-mode"); recent.classList.remove("is-tag");
  const most = chipButton("Most used", "mostused", null, false); most.classList.add("is-mode"); most.classList.remove("is-tag");
  chipsEl.appendChild(recent); chipsEl.appendChild(most);
  const sep0 = document.createElement("span"); sep0.className = "chip-sep"; sep0.setAttribute("aria-hidden","true");
  chipsEl.appendChild(sep0);
  CATEGORIES.forEach(cat => chipsEl.appendChild(chipButton(cat, "cat", cat, false)));
  if (ALL_TAGS.length) {
    const sep = document.createElement("span");
    sep.className = "chip-sep"; sep.setAttribute("aria-hidden","true");
    chipsEl.appendChild(sep);
    ALL_TAGS.forEach(tag => chipsEl.appendChild(chipButton(tag, "tag", tag, true)));
  }
}

/* ----- render the gallery ----- */
function matchesFilter(img) {
  if (activeFilter.type === "all") return true;
  if (activeFilter.type === "cat") return img.cat === activeFilter.value;
  if (activeFilter.type === "tag") return (img.tags || []).includes(activeFilter.value);
  if (activeFilter.type === "recent" || activeFilter.type === "mostused") return true; // sorted below
  return true;
}
function render() {
  const q = query.trim().toLowerCase();
  const views = CollateraViews.all();
  const mode = activeFilter.type;

  visible = IMAGES.filter(img => {
    if (!matchesFilter(img)) return false;
    const hay = (img.title + " " + img.cat + " " + (img.note||"") + " " + (img.tags||[]).join(" ")).toLowerCase();
    if (q && !hay.includes(q)) return false;
    // Recent / Most used show only items with view history
    if (mode === "recent" || mode === "mostused") return !!views[img.file];
    return true;
  });

  if (mode === "recent") {
    visible.sort((a,b) => (views[b.file]?.t||0) - (views[a.file]?.t||0));
  } else if (mode === "mostused") {
    visible.sort((a,b) => (views[b.file]?.c||0) - (views[a.file]?.c||0));
  } else {
    // default: viewed items float up by blended score; unviewed keep original order
    visible.sort((a,b) => CollateraViews.score(views[b.file]) - CollateraViews.score(views[a.file]));
  }

  grid.innerHTML = "";
  visible.forEach((img, i) => {
    const card = document.createElement("button");
    card.className = "card";
    card.style.setProperty("--cat", colorFor(img.cat));
    card.style.animationDelay = (Math.min(i, 18) * 0.03) + "s";
    card.onclick = () => openLightbox(i);
    card.innerHTML = `
      <img class="thumb" src="${encodeURI(img.file)}" alt="${img.title}" loading="lazy"
           onerror="this.style.opacity=.4;this.alt='Image not found — check the file name';">
      <div class="card-body">
        <span class="card-cat" style="background:${colorFor(img.cat)}">${img.cat}</span>
        <span class="card-title">${img.title}</span>
      </div>`;
    grid.appendChild(card);
  });

  const n = visible.length;
  let label = `${n} ${n === 1 ? "image" : "images"}`;
  if (activeFilter.type === "cat") label += ` in ${activeFilter.value}`;
  if (activeFilter.type === "tag") label += ` tagged #${activeFilter.value}`;
  if (mode === "recent") label += ` · recently viewed`;
  if (mode === "mostused") label += ` · most used`;
  if (q) label += ` matching “${query.trim()}”`;
  countEl.textContent = label;
  emptyEl.style.display = n ? "none" : "block";
  grid.style.display = n ? "grid" : "none";
}

/* ----- lightbox (title, category, tags, note all appear here) ----- */
const lb = document.getElementById("lightbox");
const lbImg = document.getElementById("lbImg");
const lbTitle = document.getElementById("lbTitle");
const lbNote = document.getElementById("lbNote");
const lbTagRow = document.getElementById("lbTagRow");
let lbIndex = 0;

function openLightbox(i) {
  lbIndex = i; showLb();
  const img = visible[lbIndex];
  if (img) CollateraViews.record(img.file);
  lb.classList.add("open");
  document.body.style.overflow = "hidden";
  document.getElementById("lbClose").focus();
}
function showLb() {
  const img = visible[lbIndex];
  if (!img) return;
  lbImg.src = encodeURI(img.file); lbImg.alt = img.title;
  lbTitle.textContent = img.title;
  lbNote.textContent = img.note || "[placeholder — captions under development]";
  lbTagRow.innerHTML =
    `<span class="lb-cat" style="background:${colorFor(img.cat)}">${img.cat}</span>` +
    (img.tags||[]).map(t => `<span class="lb-tag">${t}</span>`).join("");
}
function closeLb() { lb.classList.remove("open"); document.body.style.overflow = ""; }
function step(d) { lbIndex = (lbIndex + d + visible.length) % visible.length; showLb(); }
document.getElementById("lbClose").onclick = closeLb;
document.getElementById("lbPrev").onclick = () => step(-1);
document.getElementById("lbNext").onclick = () => step(1);
lb.onclick = (e) => { if (e.target === lb) closeLb(); };
document.addEventListener("keydown", (e) => {
  if (!lb.classList.contains("open")) return;
  if (e.key === "Escape") closeLb();
  if (e.key === "ArrowLeft") step(-1);
  if (e.key === "ArrowRight") step(1);
});

/* ----- search ----- */
searchEl.addEventListener("input", (e) => { query = e.target.value; render(); });

/* ----- go ----- */
buildChips();
render();
</script>
